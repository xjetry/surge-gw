services:
  surge-gw:
    image: ghcr.io/xjetry/surge-gw:latest   # 由 .github/workflows/build-image.yml 在 CI 构建并推送;本地 docker build 被宿主 egress 代理重置 github.com 而无法完成
    pull_policy: always                      # `docker compose up -d` 拉取刚推送的 :latest
    init: true                       # 兜底回收任何意外僵尸子进程,与 PID 1 的优雅终止互补
    restart: unless-stopped
    network_mode: host               # 与宿主回环同栈:容器绑 127.0.0.1 宿主即可直连,无需 publish
    environment:
      SUBSCRIPTION_URL: ${SUBSCRIPTION_URL:?set SUBSCRIPTION_URL in .env}
      HTTP_BIND: 127.0.0.1          # 仅绑回环;host 网络下宿主 Surge 经 127.0.0.1 直连,不向局域网暴露
      ADVERTISE_HOST: 127.0.0.1     # 写进 Surge 配置、供宿主机回连的 host
      DATA_DIR: /data
      # 可选覆盖:MAX_NODES / GEOSITE_URL / REFRESH_INTERVAL ...
    volumes:
      - surge-gw-data:/data          # 命名 volume:让非 root 用户(uid 10001)可写、缓存重启持久

volumes:
  surge-gw-data:
